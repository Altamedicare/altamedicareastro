  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- Sun glow -->
  <circle cx="1200" cy="280" r="180" fill="#FFE9B8" opacity="0.45"/>
  <circle cx="1200" cy="280" r="80" fill="#FFD394" opacity="0.6"/>
  <!-- Back mountains -->
  <path d="M0,700 L150,500 L320,620 L500,420 L680,580 L860,400 L1040,560 L1240,460 L1440,580 L1600,500 L1600,900 L0,900 Z" fill="url(#m1)"/>
  <!-- Front mountains -->
