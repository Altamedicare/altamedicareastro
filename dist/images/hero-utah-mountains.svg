<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="60%" stop-color="#F5F0E7"/>
      <stop offset="100%" stop-color="#E8DFCB"/>
    </linearGradient>
    <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C88A6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#466F8B" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="m2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#879B7A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6E8261" stop-opacity="0.8"/>
